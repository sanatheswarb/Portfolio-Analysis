spring.application.name=playground
spring.ai.ollama.chat.model=${OLLAMA_MODEL:qwen2.5:7b-instruct}
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.docker.compose.enabled=true

# Datasource – matches compose.yaml postgres service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:portfolio}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portfolio}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Zerodha API credentials
zerodha.base-url=https://api.kite.trade
zerodha.kite-version=3
zerodha.api-key=${ZERODHA_API_KEY:}
zerodha.api-secret=${ZERODHA_API_SECRET:}
# Full "token <api-key>:<access-token>" value. Expires daily.
# Leave empty to always use the OAuth callback flow (/api/zerodha/callback).
zerodha.authorization-header=${ZERODHA_AUTH_HEADER:}
zerodha.redirect-uri=${ZERODHA_REDIRECT_URI:https://kite.trade/}

# If GET https://api.kite.trade fails with "Connection reset", try:
# (1) JVM flag: -Djava.net.preferIPv4Stack=true
# (2) Corporate proxy: set host/port below
#zerodha.proxy-host=proxy.company.com
#zerodha.proxy-port=8080
#zerodha.connect-timeout-seconds=30
#zerodha.read-timeout-seconds=60

# AI Portfolio Advisor - Ollama LLM settings
portfolio.advisor.model=${OLLAMA_MODEL:qwen2.5:7b-instruct}
portfolio.advisor.temperature=0.2
portfolio.advisor.num-predict=${PORTFOLIO_ADVISOR_NUM_PREDICT:256}
portfolio.advisor.keep-alive=${PORTFOLIO_ADVISOR_KEEP_ALIVE:10m}
