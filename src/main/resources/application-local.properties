# Local development profile: automatically starts docker compose services.
spring.docker.compose.enabled=true
spring.docker.compose.profiles.active=db,ai
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio?options=-c%20TimeZone%3DUTC

# Keep API keys out of source control. Export FINNHUB_API_KEY in your shell or IDE env.
finnhub.api.key=${FINNHUB_API_KEY:}
