# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Disable Ollama auto-configuration during tests
spring.ai.ollama.chat.options.model=test-model
spring.ai.ollama.base-url=http://localhost:11434

# Zerodha placeholder values for tests
zerodha.base-url=https://api.kite.trade
zerodha.api-key=test-api-key
zerodha.api-secret=test-api-secret
zerodha.kite-version=3
zerodha.redirect-uri=https://kite.trade/

# Portfolio advisor test settings
portfolio.advisor.model=test-model
portfolio.advisor.temperature=0.2
portfolio.advisor.num-predict=512
