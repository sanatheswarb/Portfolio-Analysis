services:
  ollama:
    image: 'ollama/ollama:latest'
    ports:
      - '11434:11434'
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
